<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Commute Optimizer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo { font-size: 2.5rem; font-weight: 700; background: linear-gradient(45deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
        .subtitle { color: #666; font-size: 1.1rem; }

        /* Main Card */
        .main-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            margin-bottom: 2rem;
        }

        /* Input Section */
        .input-group {
            display: grid; grid-template-columns: 1fr 1fr auto; gap: 1.5rem; align-items: end; margin-bottom: 2rem;
        }
        .input-field {
            position: relative;
        }
        .input-field input {
            width: 100%; padding: 1rem 1rem 1rem 3rem; border: 2px solid #e1e5e9; border-radius: 16px;
            font-size: 1rem; transition: all 0.3s ease; background: #f8f9fa;
        }
        .input-field input:focus {
            outline: none; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.1); background: white;
        }
        .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #888; font-size: 1.1rem; }
        
        .btn-optimize {
            background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none;
            padding: 1rem 2.5rem; border-radius: 16px; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; box-shadow: 0 10px 25px rgba(102,126,234,0.3);
        }
        .btn-optimize:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(102,126,234,0.4); }
        .btn-optimize:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* Results */
        .results { display: none; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-top: 2rem; }
        .result-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 2rem;
            border-radius: 20px; text-align: center; position: relative; overflow: hidden;
        }
        .result-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg); transition: all 0.6s ease;
        }
        .result-card:hover::before { animation: shine 1s ease-in-out; }
        @keyframes shine { 0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); } 100% { transform: translateX(100%) translateY(100%) rotate(45deg); } }

        .metric-value { font-size: 3rem; font-weight: 700; margin-bottom: 0.5rem; }
        .metric-label { font-size: 1.1rem; opacity: 0.9; }

        /* Map */
        #map { height: 400px; border-radius: 20px; margin-top: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        /* Loading */
        .loading { display: none; text-align: center; padding: 3rem; }
        .spinner { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 768px) {
            .input-group { grid-template-columns: 1fr; }
            .result-grid { grid-template-columns: 1fr; }
            .container { padding: 10px; }
        }

        .alert { padding: 1rem; border-radius: 12px; margin: 1rem 0; font-weight: 500; }
        .alert-error { background: #fee; color: #c33; border: 1px solid #fcc; }
        .alert-success { background: #efe; color: #060; border: 1px solid #cfc; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo"><i class="fas fa-route"></i> AI Commute</h1>
            <p class="subtitle">Smart routes • Real-time predictions • Save time & fuel</p>
        </div>

        <div class="main-card">
            <div class="input-section">
                <div class="input-group">
                    <div class="input-field">
                        <i class="fas fa-map-marker-alt input-icon"></i>
                        <input type="text" id="start" placeholder="Starting point (e.g., Home)" required>
                    </div>
                    <div class="input-field">
                        <i class="fas fa-flag-checkered input-icon"></i>
                        <input type="text" id="end" placeholder="Destination (e.g., Office)" required>
                    </div>
                    <button class="btn-optimize" onclick="optimizeRoute()">
                        <i class="fas fa-magic"></i> Optimize Route
                    </button>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AI is finding your best route... <strong>~15s</strong></p>
            </div>

            <div class="results" id="results">
                <div class="result-grid">
                    <div class="result-card">
                        <div class="metric-value" id="aiTime">--</div>
                        <div class="metric-label">AI Predicted Time <i class="fas fa-clock"></i></div>
                    </div>
                    <div class="result-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                        <div class="metric-value" id="googleTime">--</div>
                        <div class="metric-label">Google Maps Time <i class="fab fa-google"></i></div>
                    </div>
                    <div class="result-card" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                        <div class="metric-value" id="savings">--</div>
                        <div class="metric-label">Time Saved <i class="fas fa-star"></i></div>
                    </div>
                </div>
                <div id="map"></div>
            </div>

            <div id="errorAlert" class="alert alert-error" style="display: none;"></div>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap" async defer></script>
    <script>
        let map, directionsService, directionsRenderer;
        
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 10,
                center: { lat: 37.7749, lng: -122.4194 }, // Default: SF
                mapTypeId: 'roadmap',
                styles: [
                    { featureType: 'poi', stylers: [{ visibility: 'off' }] },
                    { featureType: 'transit', stylers: [{ visibility: 'off' }] }
                ]
            });
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer({ map: map, suppressMarkers: false });
        }

        async function optimizeRoute() {
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            
            if (!start || !end) {
                showAlert('Please enter both start and end locations', 'error');
                return;
            }

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.querySelector('.btn-optimize').disabled = true;
            hideAlert();

            try {
                // Call your Flask API
                const response = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ start, end })
                });

                const data = await response.json();
                
                if (data.success) {
                    displayResults(data);
                    showMap(data.route);
                } else {
                    showAlert(data.error || 'Optimization failed', 'error');
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'error');
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.querySelector('.btn-optimize').disabled = false;
            }
        }

        function displayResults(data) {
            document.getElementById('aiTime').textContent = data.ai_time;
            document.getElementById('googleTime').textContent = data.google_time;
            document.getElementById('savings').textContent = data.time_saved;
            document.getElementById('results').style.display = 'block';
        }

        function showMap(route) {
            directionsRenderer.setDirections(route);
            map.setCenter(route.routes[0].bounds.getCenter());
        }

        function showAlert(message, type) {
            const alert = document.getElementById('errorAlert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
        }

        function hideAlert() {
            document.getElementById('errorAlert').style.display = 'none';
        }

        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') optimizeRoute();
        });
    </script>
</body>
</html>
